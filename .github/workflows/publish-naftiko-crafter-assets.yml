name: Publish Naftiko Crafter Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to upload the VSIX to (e.g. v1.2.3). Leave empty to skip publishing.'
        required: false
      polychro_run_id:
        description: 'Polychro Actions run ID to grab the native binaries from (e.g. 27817125654). Leave empty to use a Polychro release instead.'
        required: false

jobs:
  publish-vsix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout naftiko/crafter repository
        uses: actions/checkout@v5
        with:
          repository: naftiko/crafter
          # naftiko/crafter is private, use a secret PAT with contents permission and read access to naftiko/crafter
          token: ${{ secrets.CRAFTER_CONTENTS_READ }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: extensions/naftiko-crafter/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extensions/naftiko-crafter

      - name: Fetch Polychro native binaries
        # Source selection:
        #  - Default (release events / manual without run id): pull the binaries from a
        #    Polychro RELEASE. naftiko/polychro is public, so the automatic GITHUB_TOKEN is
        #    only needed to raise the API rate limit.
        #  - Manual with polychro_run_id: pull the binaries straight from an Actions RUN's
        #    artifacts (before any release exists). Downloading run artifacts ALWAYS requires
        #    a PAT with actions:read on naftiko/polychro, even though the repo is public — the
        #    workflow's own GITHUB_TOKEN cannot read another repo's artifacts.
        run: npm run fetch-binaries
        working-directory: extensions/naftiko-crafter
        env:
          GITHUB_TOKEN: ${{ github.event.inputs.polychro_run_id != '' && secrets.POLYCHRO_ACTIONS_READ || github.token }}
          POLYCHRO_RUN_ID: ${{ github.event.inputs.polychro_run_id }}
          # Used only when polychro_run_id is empty: always pull the latest Polychro release.
          POLYCHRO_VERSION: latest

      - name: Write Polychro version and date
        # Update infos.yaml in place (preserving any other fields) with:
        #  - date: the current date
        #  - polychro.version: the version matching the binaries fetched above.
        #      * If polychro_run_id is set: use the run id itself as the version.
        #      * Otherwise: use the tag of the latest Polychro release.
        working-directory: extensions/naftiko-crafter
        env:
          GH_TOKEN: ${{ github.token }}
          POLYCHRO_RUN_ID: ${{ github.event.inputs.polychro_run_id }}
        run: |
          set -euo pipefail

          if [ -n "${POLYCHRO_RUN_ID}" ]; then
            POLYCHRO_VERSION="${POLYCHRO_RUN_ID}"
          else
            # /releases/latest ignores pre-releases; naftiko/polychro only publishes
            # pre-releases (e.g. v1.0.0-alphaN), so list releases and take the most recent one.
            POLYCHRO_VERSION=$(gh release list --repo naftiko/polychro --limit 1 --json tagName --jq '.[0].tagName')
          fi

          if [ -z "${POLYCHRO_VERSION}" ]; then
            echo "Could not resolve the Polychro version" >&2
            exit 1
          fi

          CURRENT_DATE=$(date -u +%Y-%m-%d)
          INFOS_FILE=src/resources/infos.yaml

          echo "Polychro version: ${POLYCHRO_VERSION}"
          echo "Date: ${CURRENT_DATE}"

          mkdir -p "$(dirname "${INFOS_FILE}")"
          touch "${INFOS_FILE}"
          POLYCHRO_VERSION="${POLYCHRO_VERSION}" CURRENT_DATE="${CURRENT_DATE}" \
            yq -i '.date = strenv(CURRENT_DATE) | .polychro.version = strenv(POLYCHRO_VERSION)' "${INFOS_FILE}"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package
        working-directory: extensions/naftiko-crafter

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: naftiko-crafter-vsix
          path: extensions/naftiko-crafter/*.vsix

      - name: Publish to GitHub Releases (fleet)
        if: github.event_name == 'release' || github.event.inputs.version != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VSIX=$(ls extensions/naftiko-crafter/*.vsix | head -1)
          TAG="${{ github.event.release.tag_name || github.event.inputs.version }}"
          gh release upload "$TAG" "$VSIX" --clobber --repo ${{ github.repository }}
