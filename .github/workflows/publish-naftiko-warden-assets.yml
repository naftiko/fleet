name: Publish Naftiko Warden Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.3)'
        required: true

jobs:
  update-backstage-template:
    runs-on: ubuntu-latest
    #needs: publish-backstage-plugins

    steps:
      - name: Checkout fleet repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.FLEET_CONTENTS_WRITE_PR_WRITE }}
          path: fleet

      - name: Checkout naftiko/warden repository
        uses: actions/checkout@v5
        with:
          repository: naftiko/warden
          # naftiko/warden is private, use a secret PAT with contents permission and read access to naftiko/warden
          token: ${{ secrets.WARDEN_CONTENTS_READ }}
          path: warden

      - name: Copy templates (excluding *.md files)
        run: |
          rm -rf fleet/warden/templates
          mkdir -p fleet/warden/templates
          cp -R warden/templates/. fleet/warden/templates/
          find fleet/warden/templates -name '*.md' -delete

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.FLEET_CONTENTS_WRITE_PR_WRITE }}
          path: fleet
          branch: chore/update-warden-templates
          commit-message: "chore: update warden templates from warden repository"
          title: "chore: update warden templates from warden repository"
          body: |
            Automated sync from [warden repository](${{ github.server_url }}/naftiko/warden).
          delete-branch: true
