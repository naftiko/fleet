name: Publish Naftiko VSCode VSIX

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to upload the VSIX to (e.g. v1.2.3). Leave empty to skip publishing.'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout naftiko/vscode repository
        uses: actions/checkout@v5
        with:
          repository: naftiko/vscode
          # naftiko/vscode is private, use a secret PAT with contents permission and read access to naftiko/vscode
          token: ${{ secrets.VSCODE_CONTENTS_READ }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: extensions/naftiko-vscode/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extensions/naftiko-vscode

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package
        working-directory: extensions/naftiko-vscode

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: naftiko-vscode-vsix
          path: extensions/naftiko-vscode/*.vsix

      - name: Publish to GitHub Releases (fleet)
        if: github.event_name == 'release' || github.event.inputs.version != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VSIX=$(ls extensions/naftiko-vscode/*.vsix | head -1)
          TAG="${{ github.event.release.tag_name || github.event.inputs.version }}"
          gh release upload "$TAG" "$VSIX" --clobber --repo ${{ github.repository }}
