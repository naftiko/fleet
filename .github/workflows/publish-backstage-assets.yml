name: Publish Backstage Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.3)'
        required: true

jobs:
  publish-backstage-plugins:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout naftiko/backstage repository
        uses: actions/checkout@v5
        with:
          repository: naftiko/backstage
          # naftiko/backstage is private, use a secret PAT with contents permission and read access to naftiko/backstage
          token: ${{ secrets.BACKSTAGE_CONTENTS_READ }}
          path: backstage

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@naftiko'

      - name: Install dependencies
        working-directory: backstage/plugins/scaffolder-backend-module-naftiko
        run: yarn install --frozen-lockfile

      - name: Generate TypeScript declarations
        working-directory: backstage/plugins/scaffolder-backend-module-naftiko
        run: yarn tsc

      - name: Build plugin
        working-directory: backstage/plugins/scaffolder-backend-module-naftiko
        run: yarn build

      - name: Set version
        working-directory: backstage/plugins/scaffolder-backend-module-naftiko
        run: |
          VERSION="${{ github.event.inputs.version || '' }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          fi
          npm version "$VERSION" --no-git-tag-version

      - name: Set package entry points for publishing
        working-directory: backstage/plugins/scaffolder-backend-module-naftiko
        run: |
          npm pkg set main=dist/index.cjs.js
          npm pkg set types=dist-types/src/index.d.ts

      - name: Publish to GitHub Packages
        working-directory: backstage/plugins/scaffolder-backend-module-naftiko
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-backstage-template:
    runs-on: ubuntu-latest
    needs: publish-backstage-plugins

    steps:
      - name: Checkout fleet repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.FLEET_CONTENTS_WRITE_PR_WRITE }}
          path: fleet

      - name: Checkout naftiko/backstage repository
        uses: actions/checkout@v5
        with:
          repository: naftiko/backstage
          # naftiko/backstage is private, use a secret PAT with contents permission and read access to naftiko/backstage
          token: ${{ secrets.BACKSTAGE_CONTENTS_READ }}
          path: backstage

      - name: Copy templates (excluding *.md files)
        run: |
          rm -rf fleet/backstage/templates
          mkdir -p fleet/backstage/templates
          cp -R backstage/templates/. fleet/backstage/templates/
          find fleet/backstage/templates -name '*.md' -delete

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.FLEET_CONTENTS_WRITE_PR_WRITE }}
          path: fleet
          branch: chore/update-backstage-templates
          commit-message: "chore: update backstage templates from backstage repository"
          title: "chore: update backstage templates from backstage repository"
          body: |
            Automated sync from [backstage repository](${{ github.server_url }}/naftiko/backstage).
          delete-branch: true
